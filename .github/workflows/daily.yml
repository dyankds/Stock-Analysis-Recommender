name: 🌙 Daily HalalStock Analysis

on:
  schedule:
    # 18:00 EET = 15:00 UTC (UTC+3 in summer) — Mon to Fri
    - cron: '0 15 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options: [full, test]

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily analysis & send alerts
        run: python scheduler.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS:    ${{ secrets.EMAIL_RECEIVERS }}

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-results-${{ github.run_id }}
          path: data/latest_results.json
          retention-days: 30
